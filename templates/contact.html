<!DOCTYPE html>
<html lang="ru">
<head>
    <a class="nav-link" href="#">{{ t.nav_home }}</a>

    <div class="dropdown">
        <button class="btn btn-outline-light dropdown-toggle" data-bs-toggle="dropdown">
            {{ current_lang|upper }}
        </button>
        <ul class="dropdown-menu">
            <li><a class="dropdown-item fw-bold py-2" href="{% url 'change_lang' 'ru' %}">🇷🇺 Русский</a></li>
            <li><a class="dropdown-item fw-bold py-2" href="{% url 'change_lang' 'uz' %}">🇺🇿 O'zbekcha</a></li>
            <li><a class="dropdown-item fw-bold py-2" href="{% url 'change_lang' 'en' %}">🇬🇧 English</a></li>
        </ul>
    </div>

    <h1>{{ t.hero_title }}</h1>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Быстрая запись | AutoPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .booking-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            margin: 20px;
        }
        .back-btn {
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }
        .back-btn:hover {
            color: #ff6b00;
        }
        /* Стили для выбора услуги как кнопок */
        .service-selector {
            display: none;
        }
        .service-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            height: 100%;
            text-align: center;
            font-weight: 600;
            color: #475569;
        }
        .service-label i {
            font-size: 24px;
            margin-bottom: 8px;
            color: #94a3b8;
        }
        /* Состояние активной карточки услуги */
        .service-selector:checked + .service-label {
            border-color: #ff6b00;
            background-color: rgba(255, 107, 0, 0.05);
            color: #ff6b00;
        }
        .service-selector:checked + .service-label i {
            color: #ff6b00;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            background: #f8fafc;
        }
        .form-control:focus {
            border-color: #ff6b00;
            box-shadow: none;
            background: white;
        }
        .btn-submit {
            background: #ff6b00;
            color: white;
            font-weight: 700;
            border-radius: 12px;
            padding: 15px;
            border: none;
            transition: 0.3s;
        }
        .btn-submit:hover {
            background: #e65c00;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="booking-container">
    <a href="{% url 'index' %}" class="back-btn mb-4 d-inline-block">
        <i class="bi bi-arrow-left me-2"></i> Вернуться на главную
    </a>

    <h2 class="fw-bold mb-1">Запись на сервис</h2>
    <p class="text-muted mb-4">Выберите услугу и оставьте контакты, мы ждем вас!</p>

    <form action="{% url 'contact' %}" method="POST">
        {% csrf_token %}

        <div class="mb-4">
            <label class="form-label fw-bold">Что нужно сделать?</label>
            <div class="row g-2">
                <div class="col-4">
                    <input type="radio" name="selected_item" id="service1" class="service-selector" value="Диагностика" checked>
                    <label for="service1" class="service-label">
                        <i class="bi bi-gear-fill"></i>
                        <span style="font-size: 14px;">Ремонт</span>
                    </label>
                </div>
                <div class="col-4">
                    <input type="radio" name="selected_item" id="service2" class="service-selector" value="Шиномонтаж">
                    <label for="service2" class="service-label">
                        <i class="bi bi-vinyl-fill"></i>
                        <span style="font-size: 14px;">Шины</span>
                    </label>
                </div>
                <div class="col-4">
                    <input type="radio" name="selected_item" id="service3" class="service-selector" value="Масло">
                    <label for="service3" class="service-label">
                        <i class="bi bi-droplet-fill"></i>
                        <span style="font-size: 14px;">Масло</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Ваше имя</label>
            <input type="text" name="customer_name" class="form-control" placeholder="Как к вам обращаться?" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Телефон</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0" style="border-radius: 12px 0 0 12px; border: 2px solid #e2e8f0;">+998</span>
                <input type="tel" name="phone_number" class="form-control border-start-0" style="border-radius: 0 12px 12px 0;" placeholder="(90) 123-45-67" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Выберите дату</label>
            <input type="date" name="booking_date" id="datePicker" class="form-control" required>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">Доступное время</label>
            <div id="timeSlots" class="d-flex flex-wrap gap-2">
            </div>
            <input type="hidden" name="booking_time" id="selectedTime" required>
        </div>

        <script>
            // 1. Устанавливаем минимальную дату — сегодня
            const datePicker = document.getElementById('datePicker');
            const today = new Date().toISOString().split('T')[0];
            datePicker.setAttribute('min', today);

            // 2. Генерируем временные слоты (с 9:00 до 18:00)
            const timeSlotsContainer = document.getElementById('timeSlots');
            const selectedTimeInput = document.getElementById('selectedTime');
            const times = ['09:00', '10:00', '11:00', '12:00', '14:00', '15:00', '16:00', '17:00'];

            times.forEach(time => {
                const btn = document.createElement('div');
                btn.innerText = time;
                btn.className = 'btn btn-outline-secondary flex-grow-1 py-2 px-3';
                btn.style.borderRadius = '12px';
                btn.style.cursor = 'pointer';

                btn.onclick = function() {
                    // Сбрасываем стиль у всех кнопок
                    document.querySelectorAll('#timeSlots div').forEach(b => {
                        b.classList.replace('btn-dark', 'btn-outline-secondary');
                        b.style.color = '';
                    });
                    // Активируем выбранную
                    btn.classList.replace('btn-outline-secondary', 'btn-dark');
                    btn.style.color = 'white';
                    selectedTimeInput.value = time;
                };
                timeSlotsContainer.appendChild(btn);
            });
        </script>

        <button type="submit" class="btn btn-submit w-100 fs-5">
            Подтвердить запись <i class="bi bi-check2-circle ms-2"></i>
        </button>
    </form>
</div>

</body>
</html>
